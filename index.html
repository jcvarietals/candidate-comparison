<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CA Governor 2026: Find Your Match</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-text">
        <h1>CA Governor 2026: Find Your Match</h1>
        <p class="subtitle">Compare candidates on 11 key issues and find your best match.</p>
      </div>
      <button id="copy-link-btn" class="btn-secondary">Copy link</button>
    </div>
  </header>

  <div class="app-layout">
    <aside class="sidebar">
      <section class="panel">
        <div class="panel-header">
          <h2>Candidates</h2>
          <span class="panel-hint">Select up to 8</span>
        </div>
        <div id="max-warning" class="max-warning hidden">
          8 candidates selected — deselect one to add another
        </div>
        <div id="candidate-list"></div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Issues</h2>
        </div>
        <div id="issue-list"></div>
      </section>
    </aside>

    <main class="main-content">
      <div class="matrix-wrapper" id="matrix-wrapper">
        <div id="matrix-container"></div>
      </div>
      <div id="results-container"></div>
    </main>
  </div>

  <div id="score-bar" class="score-bar"></div>

  <div id="citation-popover" class="citation-popover hidden" role="tooltip"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
