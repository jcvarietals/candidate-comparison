<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CA Primary 2026: Find Your Match</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-text">
        <h1>CA Primary 2026: Find Your Match</h1>
        <p class="subtitle">Compare candidates on key issues and find your best match.</p>
      </div>
      <div class="header-actions">
        <button id="reset-all-btn" class="btn-secondary" disabled>Reset selections</button>
        <button id="copy-link-btn" class="btn-secondary">Share current race</button>
        <button id="copy-all-btn" class="btn-secondary">Share all races</button>
      </div>
    </div>
  </header>

  <div class="race-strip">
    <div class="race-strip-inner">
      <div id="race-tabs" class="race-tabs"></div>
      <span class="race-switch-note">Switching races will reset your selections.</span>
    </div>
  </div>

  <div class="app-layout">
    <aside class="sidebar">
      <section class="panel">
        <div class="panel-header">
          <h2>Candidates</h2>
          <span class="panel-hint">Select up to 8</span>
        </div>
        <div id="max-warning" class="max-warning hidden">
          8 candidates selected — deselect one to add another
        </div>
        <div id="candidate-list"></div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Issues</h2>
        </div>
        <div id="issue-list"></div>
      </section>
    </aside>

    <main class="main-content">
      <div id="context-note" class="context-note hidden"></div>
      <div class="matrix-wrapper" id="matrix-wrapper">
        <div id="matrix-container"></div>
      </div>
      <div id="results-container"></div>
    </main>
  </div>

  <div id="score-bar" class="score-bar"></div>

  <div id="citation-popover" class="citation-popover hidden" role="tooltip"></div>
  <div id="score-card-popup" class="score-card-popup hidden" role="tooltip"></div>

  <div id="long-popup-overlay" class="long-popup-overlay hidden" role="dialog" aria-modal="true">
    <div class="long-popup">
      <div class="long-popup-header">
        <div class="long-popup-meta">
          <span class="long-popup-candidate"></span>
          <span class="long-popup-issue-label">on</span>
          <span class="long-popup-issue"></span>
        </div>
        <button id="long-popup-close" class="long-popup-close" aria-label="Close">✕</button>
      </div>
      <div class="long-popup-scroll">
        <div class="long-popup-body"></div>
        <div class="long-popup-cites-section">
          <div class="long-popup-cites-label">Sources</div>
          <div class="long-popup-cites"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
